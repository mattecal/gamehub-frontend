<div class="login-page">
  <div class="login-card">

    <div class="logo">GAMEHUB ARENA</div>
    <h1>Accedi</h1>
    <p class="subtitle">Entra nel campo di battaglia</p>

    @if (errore) {
      <div class="error-box">{{ errore }}</div>
    }

    <form (ngSubmit)="login()" #loginForm="ngForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="Il tuo username"
          autocomplete="username"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="La tua password"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="btn-submit" [disabled]="caricamento">
        @if (caricamento) {
          <span>Accesso in corso...</span>
        } @else {
          <span>ACCEDI</span>
        }
      </button>
    </form>

    <p class="switch-link">
      Non hai un account?
      <a routerLink="/registrati">Registrati</a>
    </p>

  </div>
</div>
